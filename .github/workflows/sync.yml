name: Sync Garmin

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      ACTIONS_RUNNER_FORCE_ACTIONS_NODE_VERSION: node24

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Instalar dependencias
        run: pip install -r scripts/requirements.txt

      - name: Traer datos previos (para histórico incremental)
        # El garmin.enc vive en la rama garmin-data, no en main. Lo traemos al
        # arbol de trabajo para que fetch_garmin.py pueda leer el histórico
        # previo y solo agregar los dias nuevos (en vez de re-bajar todo).
        run: |
          mkdir -p data
          git fetch origin garmin-data || true
          git show origin/garmin-data:data/garmin.enc > data/garmin.enc 2>/dev/null || true
        continue-on-error: true

      - name: Bajar y cifrar datos Garmin
        env:
          GARMIN_EMAIL: ${{ secrets.GARMIN_EMAIL }}
          GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
          DATA_PASSPHRASE: ${{ secrets.DATA_PASSPHRASE }}
        run: python scripts/fetch_garmin.py

      - name: Commit datos a la rama garmin-data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Guardamos los datos generados fuera del arbol de trabajo
          mkdir -p /tmp/gd
          cp data/garmin.enc data/meta.json /tmp/gd/
          # Cambiamos a la rama de datos (la creamos huerfana si no existe).
          # Asi los commits de datos NO van a main y Pages no se reconstruye.
          git fetch origin garmin-data || true
          if git show-ref --verify --quiet refs/remotes/origin/garmin-data; then
            git checkout -f -B garmin-data origin/garmin-data
          else
            git checkout --orphan garmin-data
            git rm -rf . >/dev/null 2>&1 || true
          fi
          mkdir -p data
          cp /tmp/gd/garmin.enc data/garmin.enc
          cp /tmp/gd/meta.json  data/meta.json
          git add data/garmin.enc data/meta.json
          git diff --staged --quiet || git commit -m "sync: $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          git push origin garmin-data
