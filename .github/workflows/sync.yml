name: Sync Garmin

on:
  schedule:
    - cron: "0 */4 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: garmin-sync
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Instalar dependencias
        run: pip install -r scripts/requirements.txt

      - name: Bajar y cifrar datos de Garmin
        env:
          GARMIN_EMAIL:           ${{ secrets.GARMIN_EMAIL }}
          GARMIN_PASSWORD:        ${{ secrets.GARMIN_PASSWORD }}
          GARMIN_TOKENSTORE_B64:  ${{ secrets.GARMIN_TOKENSTORE_B64 }}
          DATA_PASSPHRASE:        ${{ secrets.DATA_PASSPHRASE }}
          CALENDAR_ICAL_URL:      ${{ secrets.CALENDAR_ICAL_URL }}
        run: python scripts/fetch_garmin.py

      - name: Guardar datos en el repo
        run: |
          git config user.name  "coach-bot"
          git config user.email "coach-bot@users.noreply.github.com"
          git add data/garmin.enc data/meta.json
          if git diff --staged --quiet; then
            echo "Sin cambios."
          else
            git commit -m "datos garmin $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi
