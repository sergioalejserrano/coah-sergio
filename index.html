<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#F7F6F3">
<title>Coach · Vegabikes</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Coach">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" href="icon-192.png">
<script src="https://js.puter.com/v2/"></script>
<style>
  :root{
    --bg:#F7F6F3; --surface:#FFFFFF; --line:#EAEAEA; --ink:#1F2421; --muted:#787774;
    --r-red-bg:#FDEBEC; --r-red:#9F2F2D;
    --r-blue-bg:#E1F3FE; --r-blue:#1F6C9F;
    --r-green-bg:#EDF3EC; --r-green:#346538;
    --r-yellow-bg:#FBF3DB; --r-yellow:#956400;
    --r-violet-bg:#F1ECF7; --r-violet:#5b3b8c;
    --sans:'SF Pro Display','Geist Sans','Helvetica Neue',system-ui,sans-serif;
    --mono:'SF Mono','Geist Mono','JetBrains Mono',monospace;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    background:var(--bg);color:var(--ink);font-family:var(--sans);
    line-height:1.5;font-size:15px;
    padding-bottom:calc(72px + env(safe-area-inset-bottom));
    max-width:560px;margin:0 auto;
  }
  h1,h2,h3{margin:0;font-weight:600;letter-spacing:-0.02em}
  .mono{font-family:var(--mono)}
  .muted{color:var(--muted)}
  header{
    padding:18px 18px 8px;position:sticky;top:0;z-index:5;
    background:linear-gradient(180deg,var(--bg) 70%,rgba(247,246,243,0));
  }
  header .date{font-size:12px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted)}
  header h1{font-size:22px;margin-top:2px}
  .wrap{padding:4px 18px 24px}
  .card{
    background:var(--surface);border:1px solid var(--line);border-radius:12px;
    padding:18px;margin-bottom:14px;
  }
  .card h3{font-size:12px;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin-bottom:12px;font-weight:600}
  .row{display:flex;gap:12px}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .grid4{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .metric{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:14px}
  .metric .lbl{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted)}
  .metric .val{font-size:26px;font-weight:600;letter-spacing:-0.02em;margin-top:2px}
  .metric .val small{font-size:13px;color:var(--muted);font-weight:500}
  .tag{display:inline-block;font-size:10px;text-transform:uppercase;letter-spacing:.06em;
    padding:3px 9px;border-radius:9999px;font-weight:600}
  .t-red{background:var(--r-red-bg);color:var(--r-red)}
  .t-blue{background:var(--r-blue-bg);color:var(--r-blue)}
  .t-green{background:var(--r-green-bg);color:var(--r-green)}
  .t-yellow{background:var(--r-yellow-bg);color:var(--r-yellow)}
  .t-violet{background:var(--r-violet-bg);color:var(--r-violet)}
  .t-gray{background:#F0F0EF;color:#6b6b68}
  .session{display:flex;gap:14px;align-items:flex-start}
  .session .dot{width:10px;height:10px;border-radius:3px;margin-top:6px;flex:none}
  .session .body{flex:1}
  .session .title{font-size:17px;font-weight:600;letter-spacing:-0.02em}
  .session .desc{color:var(--muted);font-size:14px;margin-top:3px}
  .gauge{display:flex;align-items:center;gap:18px}
  .gauge svg{flex:none}
  .gauge .g-num{font-size:34px;font-weight:600;letter-spacing:-0.03em}
  .bars{display:flex;align-items:flex-end;gap:6px;height:70px;margin-top:4px}
  .bars .b{flex:1;border-radius:4px 4px 2px 2px;min-height:4px;position:relative}
  .bars .bl{font-size:9px;color:var(--muted);text-align:center;margin-top:5px}
  .stack{display:flex;height:14px;border-radius:7px;overflow:hidden;border:1px solid var(--line)}
  .day{display:flex;gap:12px;padding:13px 0;border-bottom:1px solid var(--line)}
  .day:last-child{border-bottom:none}
  .day .d-date{width:46px;flex:none;text-align:center}
  .day .d-dow{font-size:11px;text-transform:uppercase;color:var(--muted);letter-spacing:.05em}
  .day .d-num{font-size:19px;font-weight:600;letter-spacing:-0.02em}
  .day .d-main{flex:1;min-width:0}
  .day .d-title{font-size:15px;font-weight:600}
  .day .d-sub{font-size:13px;color:var(--muted);margin-top:1px}
  .day.today{background:var(--r-blue-bg);margin:0 -18px;padding:13px 18px;border-radius:10px;border-bottom:none}
  .day.today .d-dow{color:var(--r-blue)}
  .race{display:flex;gap:13px;padding:14px 0;border-bottom:1px solid var(--line);align-items:flex-start}
  .race:last-child{border-bottom:none}
  .race .r-cd{flex:none;width:56px;text-align:center}
  .race .r-days{font-size:24px;font-weight:600;letter-spacing:-0.03em;line-height:1}
  .race .r-dlbl{font-size:10px;text-transform:uppercase;color:var(--muted);letter-spacing:.05em}
  .race .r-main{flex:1;min-width:0}
  .race .r-name{font-size:16px;font-weight:600;letter-spacing:-0.01em}
  .race .r-meta{font-size:13px;color:var(--muted);margin-top:2px}
  .race .r-del{background:none;border:none;color:var(--muted);font-size:20px;line-height:1;padding:2px 6px;cursor:pointer}
  .race .r-edit{background:none;border:none;color:var(--muted);font-size:14px;padding:2px 6px;cursor:pointer}
  button{font-family:var(--sans)}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;
    background:var(--ink);color:#fff;border:none;border-radius:8px;padding:12px 16px;
    font-size:14px;font-weight:600;cursor:pointer;width:100%;transition:transform .12s,background .2s}
  .btn:active{transform:scale(.985)}
  .btn.ghost{background:#fff;color:var(--ink);border:1px solid var(--line)}
  .btn.sm{width:auto;padding:9px 13px;font-size:13px}
  input,select,textarea{font-family:var(--sans);font-size:15px;width:100%;
    border:1px solid var(--line);border-radius:8px;padding:11px 12px;background:#fff;color:var(--ink)}
  label{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;display:block;margin:10px 0 5px}
  /* Tooltip — fixed overlay bottom of screen, never clips */
  .tip-btn{background:none;border:1px solid var(--line);border-radius:50%;width:17px;height:17px;font-size:10px;font-weight:700;cursor:pointer;color:var(--muted);display:inline-flex;align-items:center;justify-content:center;vertical-align:middle;margin-left:3px;flex:none}
  #tipOverlay{display:none;position:fixed;left:12px;right:12px;bottom:calc(80px + env(safe-area-inset-bottom));background:var(--ink);color:#fff;border-radius:14px;padding:14px 16px;font-size:13px;line-height:1.6;z-index:200;box-shadow:0 8px 32px rgba(0,0,0,.35)}
  #tipOverlay.show{display:block}
  #tipClose{float:right;background:none;border:none;color:rgba(255,255,255,.6);font-size:20px;cursor:pointer;padding:0 0 0 10px;line-height:1}
  /* Collapsible cards */
  .collap-hdr{display:flex;justify-content:space-between;align-items:center;cursor:pointer;margin-bottom:0}
  .collap-hdr h3{margin-bottom:0}
  .collap-arrow{color:var(--muted);font-size:13px;transition:transform .2s}
  .collap-body{margin-top:14px}
  /* Metric cards with sparkline */
  .mcard{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:14px;position:relative;overflow:hidden}
  .mcard .mc-lbl{font-size:10px;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);font-weight:600}
  .mcard .mc-val{font-size:28px;font-weight:700;letter-spacing:-0.03em;margin-top:2px;line-height:1.1}
  .mcard .mc-sub{font-size:11px;color:var(--muted);margin-top:3px}
  .mcard .mc-spark{position:absolute;bottom:10px;right:10px;opacity:.5}
  /* Health tab */
  .inbody-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
  .inbody-metric{background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:12px}
  .inbody-metric .im-lbl{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted)}
  .inbody-metric .im-val{font-size:20px;font-weight:700;margin-top:2px}
  .trend-up{color:var(--r-green)}.trend-dn{color:var(--r-red)}.trend-flat{color:var(--muted)}
  /* coach */
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;
    background:var(--ink);color:#fff;border:none;border-radius:8px;padding:12px 16px;
    font-size:14px;font-weight:600;cursor:pointer;width:100%;transition:transform .12s,background .2s}
  .btn:active{transform:scale(.985)}
  .btn.ghost{background:#fff;color:var(--ink);border:1px solid var(--line)}
  .btn.sm{width:auto;padding:9px 13px;font-size:13px}
  input,select,textarea{font-family:var(--sans);font-size:15px;width:100%;
    border:1px solid var(--line);border-radius:8px;padding:11px 12px;background:#fff;color:var(--ink)}
  label{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;display:block;margin:10px 0 5px}
  /* coach */
  #chat{display:flex;flex-direction:column;gap:10px;margin-bottom:14px}
  .msg{max-width:86%;padding:11px 14px;border-radius:14px;font-size:14.5px;line-height:1.5;white-space:pre-wrap;word-wrap:break-word}
  .msg.u{align-self:flex-end;background:var(--ink);color:#fff;border-bottom-right-radius:4px}
  .msg.a{align-self:flex-start;background:#fff;border:1px solid var(--line);border-bottom-left-radius:4px}
  .msg.sys{align-self:center;background:var(--r-yellow-bg);color:var(--r-yellow);font-size:12.5px;text-align:center;border-radius:8px}
  .quick{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
  .quick button{background:#fff;border:1px solid var(--line);border-radius:9999px;padding:7px 13px;font-size:13px;cursor:pointer;color:var(--ink)}
  .composer{display:flex;gap:8px;position:sticky;bottom:calc(72px + env(safe-area-inset-bottom));background:var(--bg);padding-top:6px}
  .composer textarea{resize:none;height:46px;max-height:120px}
  .composer .btn{width:46px;flex:none;padding:0;font-size:18px}
  .typing{display:inline-flex;gap:4px}.typing i{width:6px;height:6px;border-radius:50%;background:var(--muted);animation:tp 1s infinite}
  .typing i:nth-child(2){animation-delay:.15s}.typing i:nth-child(3){animation-delay:.3s}
  @keyframes tp{0%,60%,100%{opacity:.3}30%{opacity:1}}
  /* nav */
  nav{position:fixed;bottom:0;left:0;right:0;max-width:560px;margin:0 auto;
    display:flex;background:rgba(255,255,255,.9);backdrop-filter:blur(12px);
    border-top:1px solid var(--line);padding-bottom:env(safe-area-inset-bottom);z-index:10}
  nav button{flex:1;background:none;border:none;padding:11px 0 9px;cursor:pointer;color:var(--muted);
    display:flex;flex-direction:column;align-items:center;gap:3px;font-size:10.5px;letter-spacing:.02em}
  nav button.active{color:var(--ink)}
  nav button svg{width:22px;height:22px}
  .hidden{display:none}
  .fade{animation:fade .4s cubic-bezier(.16,1,.3,1)}
  @keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .phase-banner{background:var(--ink);color:#fff;border-radius:12px;padding:16px 18px;margin-bottom:14px}
  .phase-banner .p-lbl{font-size:11px;text-transform:uppercase;letter-spacing:.08em;opacity:.7}
  .phase-banner .p-name{font-size:18px;font-weight:600;margin-top:2px;letter-spacing:-0.02em}
  .phase-banner .p-desc{font-size:13px;opacity:.85;margin-top:6px}
  .modal{position:fixed;inset:0;background:rgba(20,20,18,.4);z-index:50;display:flex;align-items:flex-end;justify-content:center}
  .modal .sheet{background:#fff;width:100%;max-width:560px;border-radius:16px 16px 0 0;padding:20px 18px calc(20px + env(safe-area-inset-bottom));max-height:90vh;overflow:auto}
  .modal h2{font-size:18px;margin-bottom:4px}
  .src-note{font-size:11px;color:var(--muted);text-align:center;margin:2px 0 14px}
  /* Tooltips */
  .tip-wrap{position:relative;display:inline-flex;align-items:center;gap:4px}
  .tip-btn{background:none;border:none;padding:0;cursor:pointer;color:var(--muted);font-size:13px;line-height:1;border-radius:50%;width:18px;height:18px;display:inline-flex;align-items:center;justify-content:center;border:1px solid var(--line)}
  .tip-bubble{display:none;position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;border-radius:10px;padding:10px 12px;font-size:12px;line-height:1.5;width:220px;z-index:30;box-shadow:0 4px 16px rgba(0,0,0,.2)}
  .tip-bubble.open{display:block}
  .tip-bubble::after{content:'';position:absolute;top:100%;left:50%;transform:translateX(-50%);border:6px solid transparent;border-top-color:var(--ink)}
  .tip-x{float:right;background:none;border:none;color:rgba(255,255,255,.7);font-size:16px;cursor:pointer;padding:0 0 0 8px;line-height:1}
  /* Day detail modal */
  .day-sheet .section{border-top:1px solid var(--line);padding:14px 0 6px}
  .day-sheet h4{font-size:11px;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin:0 0 10px;font-weight:600}
  .ex-row{display:flex;gap:12px;padding:10px 0;border-bottom:1px solid var(--line);align-items:flex-start}
  .ex-num{width:22px;height:22px;border-radius:50%;background:var(--ink);color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex:none;margin-top:1px}
  .ex-body{flex:1}
  .ex-meta{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px}
  .hydration-row{display:flex;gap:10px;margin-bottom:8px;align-items:flex-start}
  .hydration-icon{font-size:20px;flex:none;margin-top:1px}
  /* Load chart */
  .load-bar-wrap{display:flex;align-items:center;gap:8px;margin-bottom:10px}
  .load-bar-bg{flex:1;height:12px;background:var(--line);border-radius:6px;overflow:hidden;position:relative}
  .load-bar-fill{height:100%;border-radius:6px;transition:width .5s}
  .load-opt{position:absolute;top:0;height:100%;background:rgba(0,0,0,.12);border-radius:6px}
</style>
</head>
<body>
<header>
  <div style="display:flex;justify-content:space-between;align-items:flex-start">
    <div>
      <div class="date" id="hdrDate"></div>
      <h1 id="hdrTitle">Hoy</h1>
    </div>
    <div style="display:flex;gap:6px;margin-top:4px">
      <button id="refreshBtn" aria-label="Actualizar" style="background:none;border:1px solid var(--line);border-radius:8px;width:38px;height:38px;cursor:pointer;color:var(--ink)">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:middle"><path d="M21 12a9 9 0 11-3-6.7L21 3m0 0v5h-5"/></svg></button>
      <button id="settingsBtn" aria-label="Ajustes" style="background:none;border:1px solid var(--line);border-radius:8px;width:38px;height:38px;cursor:pointer;color:var(--ink)">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:middle"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 11-2.83 2.83l-.06-.06a1.65 1.65 0 00-2.92.68 1.65 1.65 0 01-3.18 0 1.65 1.65 0 00-2.92-.68l-.06.06a2 2 0 11-2.83-2.83l.06-.06A1.65 1.65 0 004.6 15a1.65 1.65 0 00-1.51-1H3a2 2 0 110-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 112.83-2.83l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 114 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 112.83 2.83l-.06.06A1.65 1.65 0 0019.4 9V9a1.65 1.65 0 001.51 1H21a2 2 0 110 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg></button>
    </div>
  </div>
</header>

<main class="wrap">
  <!-- ===== HOY ===== -->
  <section id="tab-hoy" class="fade"></section>

  <!-- ===== PLAN ===== -->
  <section id="tab-plan" class="hidden"></section>

  <!-- ===== COACH ===== -->
  <section id="tab-coach" class="hidden">
    <div class="src-note" id="coachStatus">Coach Claude · conectá tu cuenta Puter para empezar</div>
    <div class="quick" id="quickQs"></div>
    <div id="chat"></div>
    <div class="composer">
      <textarea id="chatInput" placeholder="Preguntale al coach…" rows="1"></textarea>
      <button class="btn" id="sendBtn" aria-label="Enviar">&#8593;</button>
    </div>
  </section>

  <!-- ===== CARRERAS ===== -->
  <section id="tab-carreras" class="hidden"></section>

  <!-- ===== COMIDA / NUTRICIÓN ===== -->
  <section id="tab-comida" class="hidden"></section>

  <!-- ===== SALUD ===== -->
  <section id="tab-salud" class="hidden"></section>

  <!-- tooltip overlay (shared, fixed position) -->
  <div id="tipOverlay"><button id="tipClose" onclick="hideTip()">×</button><span id="tipContent"></span></div>
</main>

<nav>
  <button data-tab="hoy" class="active" onclick="go('hoy')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h12a1 1 0 001-1V10"/></svg>Hoy</button>
  <button data-tab="plan" onclick="go('plan')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>Plan</button>
  <button data-tab="coach" onclick="go('coach')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>Coach</button>
  <button data-tab="comida" onclick="go('comida')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 3v7a3 3 0 003 3v8M7 3v6M10 3v6M18 3c-1.5 0-3 2-3 5s1 4 3 4v9"/></svg>Comida</button>
  <button data-tab="salud" onclick="go('salud')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>Salud</button>
</nav>

<script>

  zones:[ {z:"Z1",r:"<120",name:"Recuperación",cls:"t-gray"},

  // FTP real desde intervals.icu: 236W

const PBKDF2_ITERS = 200000;   // debe coincidir con fetch_garmin.py
function lsGet(k){ try{ return localStorage.getItem(k); }catch(e){ return null; } }
function lsSet(k,v){ try{ localStorage.setItem(k,v); }catch(e){} }

async function decryptBlob(b64, passphrase){
  const raw = Uint8Array.from(atob(b64.trim()), c=>c.charCodeAt(0));
  const salt = raw.slice(0,16), iv = raw.slice(16,28), ct = raw.slice(28);
  const baseKey = await crypto.subtle.importKey("raw", new TextEncoder().encode(passphrase), "PBKDF2", false, ["deriveKey"]);
  const key = await crypto.subtle.deriveKey(
    {name:"PBKDF2", salt, iterations:PBKDF2_ITERS, hash:"SHA-256"},
    baseKey, {name:"AES-GCM", length:256}, false, ["decrypt"]);
  const pt = await crypto.subtle.decrypt({name:"AES-GCM", iv}, key, ct);
  return JSON.parse(new TextDecoder().decode(pt));
}

function applyLive(o){
  if(o.today) DATA.today = Object.assign({}, DATA.today, o.today);
  if(o.sleep) DATA.sleep = o.sleep;
  if(o.bb7 && o.bb7.length) DATA.bb7 = o.bb7;
  if(o.lastActivity && o.lastActivity.name) DATA.lastActivity = o.lastActivity;
  if(o.fetchedAt) DATA.fetchedAt = o.fetchedAt;
  if(o.calendar){
    if(o.calendar.busyPM) SCHED.busyPM = [...new Set([...SCHED.busyPM, ...o.calendar.busyPM])];
    SCHED.busyAll = o.calendar.busyAll || [];
    SCHED.events = o.calendar.events || [];
  }
  DATA.source = "live";
}

async function fetchLive(){
  const pass = lsGet("coach_pass");
  if(!pass) return {ok:false, reason:"nopass"};
  try{
    const res = await fetch("data/garmin.enc?ts="+Date.now());
    if(!res.ok) return {ok:false, reason:"nofile"};
    const blob = await res.text();
    if(!blob || blob.length<40) return {ok:false, reason:"empty"};
    const o = await decryptBlob(blob, pass);
    applyLive(o);
    return {ok:true};
  }catch(e){ return {ok:false, reason:"decrypt"}; }
}

// ===================== UTIL ===========================================
function esc(s){ return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function dnum(iso){ return parseInt(iso.slice(8,10),10); }
function parseISO(iso){ const[y,m,d]=iso.split("-").map(Number); return new Date(y,m-1,d); }
function today(){ const n=new Date(); return new Date(n.getFullYear(),n.getMonth(),n.getDate()); }
function addDays(date,n){ const x=new Date(date); x.setDate(x.getDate()+n); return x; }
function isoOf(date){ return date.getFullYear()+"-"+String(date.getMonth()+1).padStart(2,"0")+"-"+String(date.getDate()).padStart(2,"0"); }
function daysBetween(aIso,bDate){ return Math.round((parseISO(aIso)-bDate)/86400000); }
function fmtRecovery(min){ const h=Math.round(min/60); return h>=24? (Math.round(h/24*10)/10)+" días" : h+" h"; }
function hm(min){ const h=Math.floor(min/60), m=Math.round(min%60); return h?(h+"h"+(m?" "+m+"m":"")):(m+"m"); }
function nMacros(ex){ const C=(ex.H+ex.Fr)*15+ex.L*12, P=ex.P*7+ex.L*8, G=ex.G*5; return {C,P,G,kcal:Math.round(C*4+P*4+G*9)}; }
function fmtLocalTime(iso){
  if(!iso) return '';
  try{
    const d=new Date(iso);
    return d.toLocaleTimeString('es-CR',{hour:'2-digit',minute:'2-digit',hour12:false})+" hora local";
  }catch(e){ return iso.slice(11,16); }
}

function phaseFor(iso){
  for(const p of PHASES){ if(iso>=p.from && iso<=p.to) return p; }
  return PHASES[PHASES.length-1];
}

// Decide la sesión recomendada según datos del día + disponibilidad + fase.
function todaySession(){
  const t = DATA.today;
  const rd = t.readiness || 0;
  const recH = (t.recoveryMin||0) / 60;
  const bb = t.bodyBattery || 0;
  const wd = today().getDay(); // 0=Dom,1=Lun,...,6=Sáb

  // Descanso total: readiness muy bajo O recovery muy alto
  if(rd < 20 || recH > 60){
    return { dot:"#9F2F2D", tag:["Descanso total","t-red"],
      title:"Descanso — recuperación activa",
      desc:`Readiness ${rd}/100 · recovery ${fmtRecovery(t.recoveryMin||0)} pendiente. Caminá suave, estirá, hidratá bien. Sin bici hoy.` };
  }
  // Martes: oficina, sin entreno
  if(wd===2){
    return { dot:"#787774", tag:["Descanso","t-gray"], title:"Día de descanso · oficina",
      desc:"Martes en la oficina. Aprovechá para estirar en el escritorio y caminar en el almuerzo." };
  }
  // Sábado: Vegabikes (fijo, se va igual pero ajustamos cómo)
  if(wd===6){
    if(rd < 45) return { dot:"#956400", tag:["Vegabikes","t-yellow"], title:"Vegabikes — rueda suave",
      desc:`Readiness ${rd}/100. Andá pero rueda en la grupeta, no tirés. Conservá energía.` };
    return { dot:"#9F2F2D", tag:["Vegabikes","t-red"], title:"Vegabikes — día duro",
      desc:"Salida con la grupeta. Empujá fuerte pero controlado. Pre: carbo bueno. Post: proteína en 45min." };
  }
  // Fuerza: miércoles o jueves cuando readiness >= 60
  if((wd===3||wd===4) && rd >= 60 && bb >= 50){
    return { dot:"#5b3b8c", tag:["Fuerza","t-violet"], title:"Fuerza + bici",
      desc:"Día de entrenamiento complementario. Rutina de fuerza (ver Plan) + Z2 opcional 45min si quedan piernas." };
  }
  // Lunes: solo mañana, suave (baile de noche)
  if(wd===1){
    if(rd < 45) return { dot:"#787774", tag:["Descanso","t-gray"], title:"Descanso · lunes",
      desc:"Readiness bajo y baile de noche. Dejá el cuerpo descansar." };
    return { dot:"#1F6C9F", tag:["Z1–Z2","t-blue"], title:"Z1–Z2 suave · 45min",
      desc:"Solo 5:30–6:30am. FC <135, cadencia 90–100rpm. Después: baile de noche." };
  }
  // Calidad: readiness alto + día disponible
  if(rd >= 70 && bb >= 55){
    return { dot:"#956400", tag:["Calidad","t-yellow"], title:"Intervalos de umbral",
      desc:`Readiness ${rd}/100 — estás fresco. 4×8min en Z4 (FC 162–178 · ~200W). Calentá 15min, enfriá 10min.` };
  }
  // Z2 base
  if(rd >= 45){
    return { dot:"#346538", tag:["Z2 base","t-green"], title:"Z2 endurance · 60–90min",
      desc:`Readiness ${rd}/100. FC 120–139, cadencia 90–100rpm. Si subís, mantenés el pulso ahí.` };
  }
  // Recuperación suave
  return { dot:"#1F6C9F", tag:["Recuperación","t-blue"], title:"Pedaleo suave · 40min",
    desc:`Readiness ${rd}/100. Z1 puro, FC <130. Sin esfuerzo.` };
}

// Ventanas de entrenamiento por día de semana
function trainWindows(wd, iso){
  const pmBusy=(SCHED.busyPM||[]).includes(iso);
  if(wd===2) return [];                                  // martes off
  if(wd===1) return [{t:"5:30–6:30am",dur:60,pref:"am"}];// lunes solo mañana
  if(wd===6) return [{t:"6:00am",dur:240,pref:"group"}]; // sábado vegabikes
  if(pmBusy) return [{t:"5:30–6:30am",dur:60,pref:"am"}];
  if(wd===0) return [{t:"7:00–9:00am",dur:120,pref:"am"}];
  return [{t:"5:30–7:00am",dur:90,pref:"am"},{t:"6:00–7:30pm",dur:90,pref:"pm"}];
}

// Plan de la semana con fuerza, KICKR y horarios
function dayPlan(date){
  const iso=isoOf(date), wd=date.getDay(), ph=phaseFor(iso);
  const wins=trainWindows(wd,iso);
  const bestWin=wins.length?wins[wins.length>1?1:0]:null; // prefer PM for KICKR quality
  const timeStr=bestWin?bestWin.t:"Sin slot";

  // carreras
  for(const r of RACES){
    const end=r.date2||r.date;
    if(iso>=r.date && iso<=end)
      return { title:r.name, sub:(r.prio==="A"?"CARRERA A · ":"")+(r.type), cls:"t-red", locked:true, type:"race", time:r.date };
  }
  // día bloqueado por calendario
  if((SCHED.busyAll||[]).includes(iso)){
    const ev=(SCHED.events||[]).find(e=>e.date===iso && e.allDay);
    return { title:"Bloqueado", sub:(ev?ev.summary+" · ":"")+"calendario", cls:"t-gray", type:"off", time:null };
  }
  // martes oficina
  if(wd===2 && SCHED.officeTue)
    return { title:"Descanso", sub:"Oficina — sin entreno", cls:"t-gray", type:"off", time:null };
  // sábado grupeta
  if(wd===6 && SCHED.satGroup)
    return { title:"Vegabikes (grupeta)", sub:"Salida 6:00am · día duro", cls:"t-yellow", type:"vegabikes", time:"6:00am" };

  // domingo: fuerza en casa O recuperación
  if(wd===0){
    if(ph.name.startsWith("Recuper"))
      return { title:"Descanso activo", sub:"Caminata suave 30min · "+timeStr, cls:"t-gray", type:"rest", time:timeStr };
    return { title:"Fuerza base · 35min", sub:"En casa · "+timeStr, cls:"t-violet", type:"strength", time:timeStr };
  }
  // lunes: Z1-Z2 suave (solo mañana)
  if(wd===1)
    return { title:"KICKR · Z1–Z2 suave · 45min", sub:"5:30–6:15am (antes del baile)", cls:"t-blue", type:"kickr-easy", time:"5:30–6:15am" };

  // miércoles: Z2 bici + fuerza tarde (o solo Z2 en recuperación)
  if(wd===3){
    if(ph.name.startsWith("Recuper")||ph.name.startsWith("Chirripó"))
      return { title:"KICKR · Z2 suave · 60min", sub:timeStr+" · FC 120–135", cls:"t-blue", type:"kickr-easy", time:timeStr };
    return { title:"KICKR Z2 · 60min + Fuerza 35min", sub:"AM bici · PM fuerza en casa", cls:"t-violet", type:"kickr-strength", time:"5:30–7:00am / 6:00pm" };
  }
  // jueves: calidad o Z2
  if(wd===4){
    if(ph.name.startsWith("Específico")||ph.name.startsWith("Pico")||ph.name.startsWith("Build"))
      return { title:"KICKR · Umbral 4×8min Z4", sub:timeStr+" · FC 162–178 / 189–212W", cls:"t-yellow", type:"kickr-quality", time:timeStr };
    return { title:"KICKR · Z2 endurance · 75min", sub:timeStr+" · cadencia 90–100rpm", cls:"t-green", type:"kickr-easy", time:timeStr };
  }
  // viernes: suave pre-sábado
  if(wd===5)
    return { title:"KICKR · Suave Z1–Z2 · 45min", sub:timeStr+" · piernas frescas para mañana", cls:"t-blue", type:"kickr-easy", time:timeStr };

  return { title:"Z2 base · 60min", sub:timeStr, cls:"t-green", type:"easy", time:timeStr };
}

function metric(lbl,val,suf){ return `<div class="metric"><div class="lbl">${lbl}</div><div class="val">${val}<small>${suf||""}</small></div></div>`; }
function gaugeSVG(pct,color){
  const r=34,c=2*Math.PI*r,off=c*(1-pct/100);
  return `<svg width="86" height="86" viewBox="0 0 86 86">
    <circle cx="43" cy="43" r="${r}" fill="none" stroke="#EEE" stroke-width="8"/>
    <circle cx="43" cy="43" r="${r}" fill="none" stroke="${color}" stroke-width="8"
      stroke-linecap="round" stroke-dasharray="${c}" stroke-dashoffset="${off}"
      transform="rotate(-90 43 43)"/></svg>`;
}

}

function saveNutr(){
  for(const k of Object.keys(NUTR.dayTypes)){
    for(const f of ["H","P","G","Fr","L"]){
      const v=parseFloat(document.getElementById(`nx-${k}-${f}`).value);
      if(!isNaN(v)) NUTR.dayTypes[k].ex[f]=v;
    }
  }

  lsSet("coach_nutr", s);
  closeNutr(); renderComida();
}

function toggleCol(id){
  const b=document.getElementById('cb_'+id), a=document.getElementById('ca_'+id);
  const open=b.style.display!=='none';
  b.style.display=open?'none':'block';
  if(a) a.style.transform=open?'rotate(0)':'rotate(180deg)';
  lsSet('col_'+id, open?'0':'1');
}
function isColOpen(id,def=false){ const v=lsGet('col_'+id); return v===null?def:v==='1'; }
function collap(id,title,content,defOpen=false){
  const open=isColOpen(id,defOpen);
  return `<div class="card">
    <div class="collap-hdr" onclick="toggleCol('${id}')">
      <h3 style="margin-bottom:0">${title}</h3>
      <span id="ca_${id}" class="collap-arrow" style="transform:${open?'rotate(180deg)':'rotate(0)'}">▾</span>
    </div>
    <div id="cb_${id}" class="collap-body" style="display:${open?'block':'none'}">${content}</div>
  </div>`;
}

// ===================== SPARKLINE ======================================
function spark(vals, color="#1F2421"){
  if(!vals||vals.length<2) return '';
  const w=56,h=28,mx=Math.max(...vals),mn=Math.min(...vals),rng=mx-mn||1;
  const pts=vals.map((v,i)=>`${Math.round(i/(vals.length-1)*w)},${Math.round(h-(v-mn)/rng*h)}`).join(' ');
  return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" class="mc-spark"><polyline points="${pts}" fill="none" stroke="${color}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
}

function loadChart(){
  const lf=DATA.loadFocus||{aerobicLow:557,aerobicHigh:1361,anaerobic:635,optLow:[600,900],optHigh:[700,1100],optAna:[200,500]};
  const max=Math.max(lf.aerobicHigh, lf.aerobicLow, lf.anaerobic, (lf.optHigh||[0,0])[1])*1.1;
  function bar(val, color, opt, label, info){
    const pct=Math.round(val/max*100);
    const optL=Math.round(opt[0]/max*100), optR=Math.round(opt[1]/max*100);
    const over=val>opt[1], under=val<opt[0];
    const status=over?"⚠ Por encima del óptimo":under?"⚠ Por debajo del óptimo":"✓ En rango";
    const statusC=over?"color:var(--r-red)":under?"color:var(--r-yellow)":"color:var(--r-green)";
    return `<div style="margin-bottom:14px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px">
        <span style="font-size:13px;font-weight:600">${tip(label, info)}</span>
        <span style="font-size:13px;font-weight:600;${statusC}">${val} <span style="font-size:11px;font-weight:400">${status}</span></span>
      </div>
      <div class="load-bar-bg">
        <div class="load-bar-fill" style="width:${pct}%;background:${color}"></div>
        <div class="load-opt" style="left:${optL}%;width:${optR-optL}%"></div>
      </div>
      <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--muted);margin-top:3px">
        <span>Óptimo: ${opt[0]}–${opt[1]}</span><span>Tu valor: ${val}</span>
      </div>
    </div>`;
  }
  return `<div class="card">
    <h3>Foco de carga · últimas 4 semanas</h3>
    <div class="muted" style="font-size:12.5px;margin-bottom:14px">La franja sombreada es el rango óptimo. Aeróbica alta está muy por encima del óptimo — por eso el plan prioriza Z2 real y días de descanso.</div>
    ${bar(lf.aerobicHigh,"#F59E0B",lf.optHigh||[700,1100],"Aeróbica alta","Carga acumulada en ritmo sostenido (Z3–Z4). Garmin la mide en semanas pasadas. Tuyo está en 1,361 — demasiado alto. El objetivo es bajarla aumentando el volumen de aeróbica baja real (Z1–Z2).")}
    ${bar(lf.aerobicLow,"#3B82F6",lf.optLow||[600,900],"Aeróbica baja","Carga en Z1–Z2 verdadero. Este es el trabajo que construye la base aeróbica y permite recuperarse entre sesiones duras. Tu 557 está por debajo del óptimo — hacés poco trabajo fácil de verdad.")}
    ${bar(lf.anaerobic,"#EF4444",lf.optAna||[200,500],"Anaeróbico","Carga en sprint, ataques y esfuerzos muy cortos por encima del VO2máx. Tu 635 está por encima del óptimo. El Vegabikes de cada sábado aporta mucho a este número.")}
    <div style="margin-top:10px;padding:10px;background:var(--r-blue-bg);border-radius:8px;font-size:12.5px;color:var(--r-blue)">
      <b>Qué hacer:</b> más kilómetros en Z2 real en el KICKR (FC 120–139, podés mantener conversación), menos Z3 "cómodo". El KICKR es perfecto para esto porque podés controlar la potencia exacta.
    </div>
  </div>`;
}

function sleepRec(rd, recovMin, planType){
  const recH=Math.round((recovMin||0)/60);
  if(rd<30||recH>48) return {hrs:"8.5–9.5h",reason:"Readiness muy bajo + recovery alto. El sueño es el recuperador más poderoso."};
  if(planType==="kickr-quality"||planType==="vegabikes") return {hrs:"8–9h",reason:"Sesión dura programada o hecha. La síntesis de glucógeno y proteína ocurre principalmente mientras dormís."};
  if(planType==="kickr-strength") return {hrs:"7.5–8.5h",reason:"Día de doble sesión (bici + fuerza). El músculo se reconstruye en el sueño profundo."};
  return {hrs:"7–8h",reason:"Día de recuperación o Z2. El cuerpo necesita menos tiempo de reparación, pero la consistencia de sueño es clave."};
}

async function ensurePuter(){
  if(!window.puter){ return false; }
  try{
    if(!(await puter.auth.isSignedIn())){ await puter.auth.signIn(); }
    return await puter.auth.isSignedIn();
  }catch(e){ return false; }
}

function addMsg(role,text){
  const el=document.createElement("div"); el.className="msg "+role;
  if(role==="a"||role==="u") el.textContent=text; else el.innerHTML=text;
  document.getElementById("chat").appendChild(el);
  el.scrollIntoView({behavior:"smooth",block:"end"});
  return el;
}
function setCoachStatus(s){ document.getElementById("coachStatus").textContent=s; }

async function ask(text){
  text=(text||document.getElementById("chatInput").value).trim();
  if(!text) return;
  document.getElementById("chatInput").value="";
  addMsg("u",text);
  const ok=await ensurePuter();
  if(!ok){ addMsg("sys","Necesitás iniciar sesión en Puter para usar el coach. Tocá de nuevo — la ventana de login es gratis y una sola vez."); return; }
  setCoachStatus("Coach Claude · conectado");
  const typing=addMsg("a",""); typing.innerHTML='<span class="typing"><i></i><i></i><i></i></span>';
  chatHistory.push({role:"user",content:text});
  try{
    // Fake-first-turn: datos en el historial, NO depende del parámetro system
    const resp=await puter.ai.chat(buildCoachMessages(),{model:"claude-sonnet-4-6"});
    const out=extractText(resp);
    typing.innerHTML=renderMd(out);
    chatHistory.push({role:"assistant",content:out});
  }catch(e){
    typing.classList.remove("a"); typing.className="msg sys";
    typing.textContent="Error: "+String(e).slice(0,120)+". Revisá tu sesión Puter.";
  }
}
function renderMd(text){
  // Tablas markdown → HTML
  const lines = text.split('\n');
  let html = '', inTable = false, tableRows = [];
  for(let i=0; i<lines.length; i++){
    const l = lines[i];
    if(l.trim().startsWith('|') && l.trim().endsWith('|')){
      if(!inTable){ inTable=true; tableRows=[]; }
      tableRows.push(l.trim().slice(1,-1).split('|').map(c=>c.trim()));
    } else {
      if(inTable){
        // flush table
        const head=tableRows[0], body=tableRows.slice(2);
        html+=`<div style="overflow-x:auto;margin:8px 0"><table style="width:100%;border-collapse:collapse;font-size:13px">
          <thead><tr>${head.map(c=>`<th style="text-align:left;padding:6px 8px;border-bottom:2px solid var(--line);font-weight:600">${esc(c)}</th>`).join('')}</tr></thead>
          <tbody>${body.map(row=>`<tr>${row.map(c=>`<td style="padding:6px 8px;border-bottom:1px solid var(--line)">${esc(c)}</td>`).join('')}</tr>`).join('')}</tbody>
        </table></div>`;
        inTable=false; tableRows=[];
      }
      // Headers
      let ln = l.replace(/^### (.+)/, '<b style="font-size:14px;display:block;margin-top:12px;margin-bottom:4px">$1</b>')
                .replace(/^## (.+)/, '<b style="font-size:15px;display:block;margin-top:14px;margin-bottom:5px">$1</b>')
                .replace(/^# (.+)/, '<b style="font-size:16px;display:block;margin-top:16px;margin-bottom:6px">$1</b>')
                .replace(/\*\*(.+?)\*\*/g,'<b>$1</b>')
                .replace(/\*(.+?)\*/g,'<i>$1</i>')
                .replace(/^[-•]\s+(.+)/, '<div style="display:flex;gap:6px;margin:3px 0"><span>•</span><span>$1</span></div>')
                .replace(/^(\d+)\.\s+(.+)/, '<div style="display:flex;gap:6px;margin:3px 0"><span style="color:var(--muted)">$1.</span><span>$2</span></div>');
      if(l.trim()==='---'||l.trim()==='—') ln='<hr style="border:none;border-top:1px solid var(--line);margin:10px 0">';
      html += (ln===l ? esc(l) : ln) + (l.trim()==='' ? '<br>' : '\n');
    }
  }
  if(inTable){
    const head=tableRows[0], body=tableRows.slice(2);
    html+=`<div style="overflow-x:auto;margin:8px 0"><table style="width:100%;border-collapse:collapse;font-size:13px">
      <thead><tr>${head.map(c=>`<th style="text-align:left;padding:6px 8px;border-bottom:2px solid var(--line);font-weight:600">${esc(c)}</th>`).join('')}</tr></thead>
      <tbody>${body.map(row=>`<tr>${row.map(c=>`<td style="padding:6px 8px;border-bottom:1px solid var(--line)">${esc(c)}</td>`).join('')}</tr>`).join('')}</tbody>
    </table></div>`;
  }
  return html;
}
function extractText(resp){
  try{
    if(typeof resp==="string") return resp;
    if(resp.message&&resp.message.content){
      const c=resp.message.content;
      if(typeof c==="string") return c;
      if(Array.isArray(c)) return c.map(b=>b.text||"").join("");
    }
    if(resp.text) return resp.text;
    if(resp.content) return Array.isArray(resp.content)?resp.content.map(b=>b.text||"").join(""):resp.content;
  }catch(e){}
  return "(respuesta vacía)";
}

// ===================== NAV ============================================
const TABS={ hoy:["Hoy",renderHoy], plan:["Plan",renderPlan], coach:["Coach",null], comida:["Comida",renderComida], salud:["Salud",renderSalud], carreras:["Carreras",renderCarreras] };
let CURRENT="hoy";
function go(tab){
  CURRENT=tab;
  // Show/hide all known tab sections
  const allTabs=[...Object.keys(TABS)];
  allTabs.forEach(k=>{
    const sec=document.getElementById("tab-"+k);
    if(!sec) return;
    sec.classList.toggle("hidden", k!==tab);
    if(k===tab) sec.classList.add("fade");
  });
  document.querySelectorAll("nav button").forEach(b=>b.classList.toggle("active",b.dataset.tab===tab));
  if(TABS[tab]){
    document.getElementById("hdrTitle").textContent=TABS[tab][0];
    if(TABS[tab][1]) TABS[tab][1]();
  }
}

// ===================== AJUSTES / REFRESCAR / PWA =====================
function toast(msg){
  const el=document.createElement("div"); el.textContent=msg;
  el.style.cssText="position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:#1F2421;color:#fff;padding:10px 16px;border-radius:9999px;font-size:13px;z-index:60;max-width:90%;text-align:center";
  document.body.appendChild(el); setTimeout(()=>el.remove(),2600);
}
function rerender(){ if(TABS[CURRENT] && TABS[CURRENT][1]) TABS[CURRENT][1](); }

async function doRefresh(){
  const btn=document.getElementById("refreshBtn");
  btn.style.opacity="0.4";
  btn.style.pointerEvents="none";
  const r=await fetchLive();
  initHeader();
  rerender();
  btn.style.opacity="";
  btn.style.pointerEvents="";
  // limpiar historial del coach para que use el contexto fresco
  if(r.ok){ chatHistory=[]; }
  const msg=r.ok
    ? "✓ Actualizado · "+fmtLocalTime(DATA.fetchedAt)
    : (r.reason==="nopass" ? "Poné tu frase en Ajustes ⚙" : "Sin datos nuevos — usando demo");
  toast(msg);
}

function openSettings(){
  const pass=lsGet("coach_pass")||"";
  const src=DATA.source==="live" ? "En vivo · "+fmtLocalTime(DATA.fetchedAt) : "Demo (snapshot)";
  const m=document.createElement("div"); m.className="modal"; m.id="setModal";
  m.innerHTML=`<div class="sheet">
    <h2>Ajustes</h2>
    <div class="muted" style="font-size:12.5px;margin-bottom:12px">Fuente de datos: <b style="color:var(--ink)">${esc(src)}</b></div>
    <label>Frase para descifrar tus datos</label>
    <input id="set-pass" type="password" value="${esc(pass)}" placeholder="la misma frase del robot (DATA_PASSPHRASE)">
    <div class="muted" style="font-size:12px;margin-top:6px">Es la misma que pusiste en GitHub. Se guarda solo en este teléfono y nunca viaja a ningún lado; sirve para descifrar tus datos localmente.</div>
    <div class="row" style="margin-top:16px;gap:10px">
      <button class="btn ghost" onclick="closeSet()">Cerrar</button>
      <button class="btn" onclick="saveSettings()">Guardar y actualizar</button>
    </div>
    <button class="btn ghost" style="margin-top:10px" onclick="addToHome()">Cómo agregar a inicio</button>
  </div>`;
  m.addEventListener("click",e=>{ if(e.target===m) closeSet(); });
  document.body.appendChild(m);
}
function closeSet(){ const m=document.getElementById("setModal"); if(m) m.remove(); }
async function saveSettings(){
  lsSet("coach_pass", document.getElementById("set-pass").value.trim());
  closeSet(); await doRefresh();
}
function addToHome(){
  toast("iPhone: Compartir → Agregar a inicio. Android: menú ⋮ → Instalar app.");
}

function registerSW(){
  if("serviceWorker" in navigator){
    navigator.serviceWorker.register("sw.js").catch(()=>{});
  }
}

  const d=today(); const full=["domingo","lunes","martes","miércoles","jueves","viernes","sábado"][d.getDay()];
  document.getElementById("hdrDate").textContent=full+" "+d.getDate()+" "+MON[d.getMonth()]+" · "+DATA.athlete.city;
