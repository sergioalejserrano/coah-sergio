<html lang="es">
<head>
<meta charset="UTF-8">

<title>Coach · Vegabikes</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">

<style>
  :root{
    --bg:#F7F6F3; --surface:#FFFFFF; --line:#EAEAEA; --ink:#1F2421; --muted:#787774;
    --r-red-bg:#FDEBEC; --r-red:#9F2F2D;
    --r-blue-bg:#E1F3FE; --r-blue:#1F6C9F;
    --r-green-bg:#EDF3EC; --r-green:#346538;
    --r-yellow-bg:#FBF3DB; --r-yellow:#956400;
    --r-violet-bg:#F1ECF7; --r-violet:#5b3b8c;
    --sans:'SF Pro Display','Geist Sans','Helvetica Neue',system-ui,sans-serif;
    --mono:'SF Mono','Geist Mono','JetBrains Mono',monospace;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    background:var(--bg);color:var(--ink);font-family:var(--sans);
    line-height:1.5;font-size:15px;
    padding-bottom:calc(72px + env(safe-area-inset-bottom));
    max-width:560px;margin:0 auto;
  }
  h1,h2,h3{margin:0;font-weight:600;letter-spacing:-0.02em}
  .mono{font-family:var(--mono)}
  .muted{color:var(--muted)}
  header{
    padding:18px 18px 8px;position:sticky;top:0;z-index:5;
    background:linear-gradient(180deg,var(--bg) 70%,rgba(247,246,243,0));
  }
  header .date{font-size:12px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted)}
  header h1{font-size:22px;margin-top:2px}
  .wrap{padding:4px 18px 24px}
  .card{
    background:var(--surface);border:1px solid var(--line);border-radius:12px;
    padding:18px;margin-bottom:14px;
  }
  .card h3{font-size:12px;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin-bottom:12px;font-weight:600}
  .row{display:flex;gap:12px}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .grid4{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .metric{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:14px}
  .metric .lbl{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted)}
  .metric .val{font-size:26px;font-weight:600;letter-spacing:-0.02em;margin-top:2px}
  .metric .val small{font-size:13px;color:var(--muted);font-weight:500}
  .tag{display:inline-block;font-size:10px;text-transform:uppercase;letter-spacing:.06em;
    padding:3px 9px;border-radius:9999px;font-weight:600}
  .t-red{background:var(--r-red-bg);color:var(--r-red)}
  .t-blue{background:var(--r-blue-bg);color:var(--r-blue)}
  .t-green{background:var(--r-green-bg);color:var(--r-green)}
  .t-yellow{background:var(--r-yellow-bg);color:var(--r-yellow)}
  .t-violet{background:var(--r-violet-bg);color:var(--r-violet)}
  .t-gray{background:#F0F0EF;color:#6b6b68}
  .session{display:flex;gap:14px;align-items:flex-start}
  .session .dot{width:10px;height:10px;border-radius:3px;margin-top:6px;flex:none}
  .session .body{flex:1}
  .session .title{font-size:17px;font-weight:600;letter-spacing:-0.02em}
  .session .desc{color:var(--muted);font-size:14px;margin-top:3px}
  .gauge{display:flex;align-items:center;gap:18px}
  .gauge svg{flex:none}
  .gauge .g-num{font-size:34px;font-weight:600;letter-spacing:-0.03em}
  .bars{display:flex;align-items:flex-end;gap:6px;height:70px;margin-top:4px}
  .bars .b{flex:1;border-radius:4px 4px 2px 2px;min-height:4px;position:relative}
  .bars .bl{font-size:9px;color:var(--muted);text-align:center;margin-top:5px}
  .stack{display:flex;height:14px;border-radius:7px;overflow:hidden;border:1px solid var(--line)}
  .day{display:flex;gap:12px;padding:13px 0;border-bottom:1px solid var(--line)}
  .day:last-child{border-bottom:none}
  .day .d-date{width:46px;flex:none;text-align:center}
  .day .d-dow{font-size:11px;text-transform:uppercase;color:var(--muted);letter-spacing:.05em}
  .day .d-num{font-size:19px;font-weight:600;letter-spacing:-0.02em}
  .day .d-main{flex:1;min-width:0}
  .day .d-title{font-size:15px;font-weight:600}
  .day .d-sub{font-size:13px;color:var(--muted);margin-top:1px}
  .day.today{background:var(--r-blue-bg);margin:0 -18px;padding:13px 18px;border-radius:10px;border-bottom:none}
  .day.today .d-dow{color:var(--r-blue)}
  .race{display:flex;gap:13px;padding:14px 0;border-bottom:1px solid var(--line);align-items:flex-start}
  .race:last-child{border-bottom:none}
  .race .r-cd{flex:none;width:56px;text-align:center}
  .race .r-days{font-size:24px;font-weight:600;letter-spacing:-0.03em;line-height:1}
  .race .r-dlbl{font-size:10px;text-transform:uppercase;color:var(--muted);letter-spacing:.05em}
  .race .r-main{flex:1;min-width:0}
  .race .r-name{font-size:16px;font-weight:600;letter-spacing:-0.01em}
  .race .r-meta{font-size:13px;color:var(--muted);margin-top:2px}
  .race .r-del{background:none;border:none;color:var(--muted);font-size:20px;line-height:1;padding:2px 6px;cursor:pointer}
  button{font-family:var(--sans)}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;
    background:var(--ink);color:#fff;border:none;border-radius:8px;padding:12px 16px;
    font-size:14px;font-weight:600;cursor:pointer;width:100%;transition:transform .12s,background .2s}
  .btn:active{transform:scale(.985)}
  .btn.ghost{background:#fff;color:var(--ink);border:1px solid var(--line)}
  .btn.sm{width:auto;padding:9px 13px;font-size:13px}
  input,select,textarea{font-family:var(--sans);font-size:15px;width:100%;
    border:1px solid var(--line);border-radius:8px;padding:11px 12px;background:#fff;color:var(--ink)}
  label{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;display:block;margin:10px 0 5px}
  /* coach */
  #chat{display:flex;flex-direction:column;gap:10px;margin-bottom:14px}
  .msg{max-width:86%;padding:11px 14px;border-radius:14px;font-size:14.5px;line-height:1.5;white-space:pre-wrap;word-wrap:break-word}
  .msg.u{align-self:flex-end;background:var(--ink);color:#fff;border-bottom-right-radius:4px}
  .msg.a{align-self:flex-start;background:#fff;border:1px solid var(--line);border-bottom-left-radius:4px}
  .msg.sys{align-self:center;background:var(--r-yellow-bg);color:var(--r-yellow);font-size:12.5px;text-align:center;border-radius:8px}
  .quick{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
  .quick button{background:#fff;border:1px solid var(--line);border-radius:9999px;padding:7px 13px;font-size:13px;cursor:pointer;color:var(--ink)}
  .composer{display:flex;gap:8px;position:sticky;bottom:calc(72px + env(safe-area-inset-bottom));background:var(--bg);padding-top:6px}
  .composer textarea{resize:none;height:46px;max-height:120px}
  .composer .btn{width:46px;flex:none;padding:0;font-size:18px}
  .typing{display:inline-flex;gap:4px}.typing i{width:6px;height:6px;border-radius:50%;background:var(--muted);animation:tp 1s infinite}
  .typing i:nth-child(2){animation-delay:.15s}.typing i:nth-child(3){animation-delay:.3s}
  @keyframes tp{0%,60%,100%{opacity:.3}30%{opacity:1}}
  /* nav */
  nav{position:fixed;bottom:0;left:0;right:0;max-width:560px;margin:0 auto;
    display:flex;background:rgba(255,255,255,.9);backdrop-filter:blur(12px);
    border-top:1px solid var(--line);padding-bottom:env(safe-area-inset-bottom);z-index:10}
  nav button{flex:1;background:none;border:none;padding:11px 0 9px;cursor:pointer;color:var(--muted);
    display:flex;flex-direction:column;align-items:center;gap:3px;font-size:10.5px;letter-spacing:.02em}
  nav button.active{color:var(--ink)}
  nav button svg{width:22px;height:22px}
  .hidden{display:none}
  .fade{animation:fade .4s cubic-bezier(.16,1,.3,1)}
  @keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .phase-banner{background:var(--ink);color:#fff;border-radius:12px;padding:16px 18px;margin-bottom:14px}
  .phase-banner .p-lbl{font-size:11px;text-transform:uppercase;letter-spacing:.08em;opacity:.7}
  .phase-banner .p-name{font-size:18px;font-weight:600;margin-top:2px;letter-spacing:-0.02em}
  .phase-banner .p-desc{font-size:13px;opacity:.85;margin-top:6px}
  .modal{position:fixed;inset:0;background:rgba(20,20,18,.4);z-index:50;display:flex;align-items:flex-end;justify-content:center}
  .modal .sheet{background:#fff;width:100%;max-width:560px;border-radius:16px 16px 0 0;padding:20px 18px calc(20px + env(safe-area-inset-bottom));max-height:90vh;overflow:auto}
  .modal h2{font-size:18px;margin-bottom:4px}
  .src-note{font-size:11px;color:var(--muted);text-align:center;margin:2px 0 14px}
</style>
</head>
<body>
<header>

    <div>

    </div>
  </div>
</header>

<main class="wrap">
  <!-- ===== HOY ===== -->
  <section id="tab-hoy" class="fade"></section>

  <!-- ===== PLAN ===== -->
  <section id="tab-plan" class="hidden"></section>

  <!-- ===== COACH ===== -->
  <section id="tab-coach" class="hidden">
    <div class="src-note" id="coachStatus">Coach Claude · conectá tu cuenta Puter para empezar</div>
    <div class="quick" id="quickQs"></div>

  <section id="tab-carreras" class="hidden"></section>

</main>

<nav>

    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h12a1 1 0 001-1V10"/></svg>Hoy</button>

  <button data-tab="coach" onclick="go('coach')">

  <button data-tab="comida" onclick="go('comida')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 3v7a3 3 0 003 3v8M7 3v6M10 3v6M18 3c-1.5 0-3 2-3 5s1 4 3 4v9"/></svg>Comida</button>
  <button data-tab="carreras" onclick="go('carreras')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 3v18M5 4h13l-2 4 2 4H5"/></svg>Carreras</button>
</nav>

let RACES = JSON.parse(JSON.stringify(DEFAULT_RACES));
const DOW = ["Dom","Lun","Mar","Mié","Jue","Vie","Sáb"];

// ===================== STORAGE + DATOS EN VIVO ==============================
const PBKDF2_ITERS = 200000;   // debe coincidir con fetch_garmin.py
function lsGet(k){ try{ return localStorage.getItem(k); }catch(e){ return null; } }
function lsSet(k,v){ try{ localStorage.setItem(k,v); }catch(e){} }

async function decryptBlob(b64, passphrase){
  const raw = Uint8Array.from(atob(b64.trim()), c=>c.charCodeAt(0));
  const salt = raw.slice(0,16), iv = raw.slice(16,28), ct = raw.slice(28);
  const baseKey = await crypto.subtle.importKey("raw", new TextEncoder().encode(passphrase), "PBKDF2", false, ["deriveKey"]);
  const key = await crypto.subtle.deriveKey(
    {name:"PBKDF2", salt, iterations:PBKDF2_ITERS, hash:"SHA-256"},
    baseKey, {name:"AES-GCM", length:256}, false, ["decrypt"]);
  const pt = await crypto.subtle.decrypt({name:"AES-GCM", iv}, key, ct);
  return JSON.parse(new TextDecoder().decode(pt));
}

function applyLive(o){
  if(o.today) DATA.today = Object.assign({}, DATA.today, o.today);
  if(o.sleep) DATA.sleep = o.sleep;
  if(o.bb7 && o.bb7.length) DATA.bb7 = o.bb7;
  if(o.lastActivity && o.lastActivity.name) DATA.lastActivity = o.lastActivity;
  if(o.fetchedAt) DATA.fetchedAt = o.fetchedAt;
  if(o.calendar){
    if(o.calendar.busyPM) SCHED.busyPM = [...new Set([...SCHED.busyPM, ...o.calendar.busyPM])];
    SCHED.busyAll = o.calendar.busyAll || [];
    SCHED.events = o.calendar.events || [];
  }
  DATA.source = "live";
}

async function fetchLive(){
  const pass = lsGet("coach_pass");
  if(!pass) return {ok:false, reason:"nopass"};
  try{
    const res = await fetch("data/garmin.enc?ts="+Date.now());
    if(!res.ok) return {ok:false, reason:"nofile"};
    const blob = await res.text();
    if(!blob || blob.length<40) return {ok:false, reason:"empty"};
    const o = await decryptBlob(blob, pass);
    applyLive(o);
    return {ok:true};
  }catch(e){ return {ok:false, reason:"decrypt"}; }
}

// ===================== UTIL ===========================================
function esc(s){ return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function dnum(iso){ return parseInt(iso.slice(8,10),10); }
function parseISO(iso){ const[y,m,d]=iso.split("-").map(Number); return new Date(y,m-1,d); }
function today(){ const n=new Date(); return new Date(n.getFullYear(),n.getMonth(),n.getDate()); }
function addDays(date,n){ const x=new Date(date); x.setDate(x.getDate()+n); return x; }
function isoOf(date){ return date.getFullYear()+"-"+String(date.getMonth()+1).padStart(2,"0")+"-"+String(date.getDate()).padStart(2,"0"); }
function daysBetween(aIso,bDate){ return Math.round((parseISO(aIso)-bDate)/86400000); }
function fmtRecovery(min){ const h=Math.round(min/60); return h>=24? (Math.round(h/24*10)/10)+" días" : h+" h"; }
function hm(min){ const h=Math.floor(min/60), m=Math.round(min%60); return h?(h+"h"+(m?" "+m+"m":"")):(m+"m"); }
function nMacros(ex){ const C=(ex.H+ex.Fr)*15+ex.L*12, P=ex.P*7+ex.L*8, G=ex.G*5; return {C,P,G,kcal:Math.round(C*4+P*4+G*9)}; }

function phaseFor(iso){
  for(const p of PHASES){ if(iso>=p.from && iso<=p.to) return p; }
  return PHASES[PHASES.length-1];
}

// ===================== MOTOR ADAPTATIVO ===============================
// Decide la sesión recomendada según datos del día + disponibilidad + fase.
function todaySession(){
  const t = DATA.today;
  // 1) regla de recuperación: si recovery alto o readiness bajo -> descanso
  if(t.readiness < 25 || t.recoveryMin > 2880){
    return { dot:"#9F2F2D", tag:["Descanso","t-red"],
      title:"Recuperación",
      desc:"Readiness "+t.readiness+"/100 y "+fmtRecovery(t.recoveryMin)+" de recuperación pendiente. Hoy ya metiste 72km duros (FC media 167). Resto del día: descanso total o caminar suave. Hidratá y comé proteína." };
  }
  if(t.readiness < 45)
    return { dot:"#1F6C9F", tag:["Z2 corto","t-blue"], title:"Rodada suave 45 min",
      desc:"Z1–Z2 (FC <140). Piernas sueltas, nada de fuerza." };
  if(t.readiness < 70)
    return { dot:"#346538", tag:["Endurance","t-green"], title:"Z2 60–90 min",
      desc:"Base aeróbica constante, cadencia 90–100 rpm." };
  return { dot:"#956400", tag:["Calidad","t-yellow"], title:"Intervalos de calidad",
    desc:"Estás fresco. 3–4× 8 min en umbral (Z4) con 4 min suave." };
}

// Plan para un día futuro (template por fase + disponibilidad)
function dayPlan(date){
  const iso=isoOf(date), wd=date.getDay(), ph=phaseFor(iso);
  // carreras
  for(const r of RACES){
    const end=r.date2||r.date;
    if(iso>=r.date && iso<=end){
      return { title:r.name, sub:(r.prio==="A"?"CARRERA A · ":"")+(r.type), cls:"t-red", locked:true };
    }
  }
  // martes oficina
  if(wd===2 && SCHED.officeTue) return { title:"Descanso", sub:"Oficina — sin entreno", cls:"t-gray" };
  // día completo bloqueado por calendario (viaje, hike, etc.)
  if((SCHED.busyAll||[]).includes(iso)){
    const ev=(SCHED.events||[]).find(e=>e.date===iso && e.allDay);
    return { title:"Bloqueado", sub:(ev?ev.summary+" · ":"")+"calendario", cls:"t-gray" };
  }
  // sábado grupeta
  if(wd===6 && SCHED.satGroup){
    const hard = DATA.today.readiness>=50;
    return { title:"Vegabikes (grupeta)", sub: hard? "Día duro · empujá fuerte":"Vas igual, pero sentate en grupeta y no tires", cls:"t-yellow" };
  }
  const pmBusy = SCHED.busyPM.includes(iso);
  const win = wd===1 ? "Solo 5:30–6:30am (baile en la noche)"
            : pmBusy ? "Solo en la mañana (cita en la tarde)"
            : "Mañana o tarde";
  // intensidad según fase
  let s;
  if(ph.name.startsWith("Recuper")) s={title:"Z2 suave 60 min", sub:win, cls:"t-blue"};
  else if(wd===3) s={title:"Calidad: intervalos umbral", sub:win+" · 4×8min Z4", cls:"t-yellow"};
  else if(wd===5) s={title:"Suave / aperturas", sub:win+" · pre-sábado", cls:"t-blue"};
  else if(wd===0) s={title:"Z2 largo o recuperación", sub:"Según cómo venga el sábado", cls:"t-green"};
  else s={title:"Z2 endurance 75 min", sub:win+" · cadencia 90–100", cls:"t-green"};
  if(wd===1) s.title="Z1–Z2 suave 45 min";
  return s;
}

function metric(lbl,val,suf){ return `<div class="metric"><div class="lbl">${lbl}</div><div class="val">${val}<small>${suf||""}</small></div></div>`; }
function gaugeSVG(pct,color){
  const r=34,c=2*Math.PI*r,off=c*(1-pct/100);
  return `<svg width="86" height="86" viewBox="0 0 86 86">
    <circle cx="43" cy="43" r="${r}" fill="none" stroke="#EEE" stroke-width="8"/>
    <circle cx="43" cy="43" r="${r}" fill="none" stroke="${color}" stroke-width="8"
      stroke-linecap="round" stroke-dasharray="${c}" stroke-dashoffset="${off}"
      transform="rotate(-90 43 43)"/></svg>`;
}

      <div class="muted" style="font-size:13px;margin-top:10px">Bajar grasa <b style="color:var(--ink)">conservando músculo</b>: por eso la proteína se mantiene alta todos los días y el carbo sube solo cuando entrenás fuerte. TMB ${g.tmb} kcal.</div>
    </div>

    <h3 style="font-size:12px;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin:18px 0 10px">Intercambios por tipo de día</h3>

  `;
}
function openNutrModal(){
  const rows=Object.entries(NUTR.dayTypes).map(([k,d])=>`
    <div style="border-bottom:1px solid var(--line);padding:10px 0">
      <div style="font-size:13px;font-weight:600;margin-bottom:6px">${d.name}</div>
      <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:6px">
        ${["H","P","G","Fr","L"].map(f=>`<div><label style="margin:0 0 3px">${f}</label>
          <input type="number" inputmode="numeric" id="nx-${k}-${f}" value="${d.ex[f]}" style="padding:8px"></div>`).join("")}
      </div></div>`).join("");
  const m=document.createElement("div"); m.className="modal"; m.id="nutrModal";
  m.innerHTML=`<div class="sheet"><h2>Ajustar intercambios</h2>
    <div class="muted" style="font-size:12.5px;margin-bottom:6px">H harinas · P proteínas · G grasas · Fr frutas · L lácteos</div>
    ${rows}
    <div class="row" style="margin-top:16px;gap:10px">
      <button class="btn ghost" onclick="closeNutr()">Cancelar</button>
      <button class="btn" onclick="saveNutr()">Guardar</button>
    </div></div>`;
  m.addEventListener("click",e=>{ if(e.target===m) closeNutr(); });
  document.body.appendChild(m);
}
function closeNutr(){ const m=document.getElementById("nutrModal"); if(m) m.remove(); }
function saveNutr(){
  for(const k of Object.keys(NUTR.dayTypes)){
    for(const f of ["H","P","G","Fr","L"]){
      const v=parseFloat(document.getElementById(`nx-${k}-${f}`).value);
      if(!isNaN(v)) NUTR.dayTypes[k].ex[f]=v;
    }
  }
  const s=JSON.stringify(Object.fromEntries(Object.entries(NUTR.dayTypes).map(([k,d])=>[k,d.ex])));
  lsSet("coach_nutr", s);
  closeNutr(); renderComida();
}

// ===================== COACH (Claude vía Puter) =======================
let chatHistory=[];
const QUICK=["¿Debo entrenar hoy?","¿Qué desayuno hoy?","Plan para el sábado con Vegabikes","¿Cómo llego bien al Cerro?"];
function renderQuick(){ document.getElementById("quickQs").innerHTML =
  QUICK.map(q=>`<button onclick="ask(this.textContent)">${esc(q)}</button>`).join(""); }

function coachSystemPrompt(){
  const t=DATA.today, a=DATA.athlete, la=DATA.lastActivity;
  const racesTxt=RACES.map(r=>`- ${r.name} (${r.prio}) ${fmtRaceDate(r)} ${r.type} ${r.km?r.km+"km":""} ${r.elev?r.elev+"m":""}`).join("\n");
  return `Sos el coach de ciclismo de ${a.name}, un ciclista costarricense de ${a.age} años en ${a.city}. Hablás en español tico, directo, cálido y concreto. Das consejos accionables, no charlas largas.

PERFIL: ${a.weightKg}kg, ${a.heightCm}cm. VO2máx ${a.vo2}, LTHR ${a.lthr} bpm, FTP ~${a.ftp}W (2.43 W/kg). Zonas FC: Z1<120, Z2 120-139, Z3 140-161, Z4 162-178, Z5>178.

DATOS DE HOY (Garmin, ${DATA.fetchedAt.slice(0,10)}):
- Training Readiness ${t.readiness}/100 (${t.readinessMsg}).
- Tiempo de recuperación pendiente: ${fmtRecovery(t.recoveryMin)}.
- Body Battery ${t.bodyBattery}/100, sueño score ${t.sleepScore} (${t.sleepHrs}h), HRV semanal ${t.hrvWeekly}ms, FC reposo ${t.restingHr}.
- Última salida: ${la.km}km, ${Math.floor(la.min/60)}h${la.min%60}, FC media ${la.hrAvg} (máx ${la.hrMax}), ${la.watts}W, cadencia ${la.cad}rpm.

HORARIO: Trabaja Lun-Vie 8:00-17:30. Martes en oficina (no entrena). Lunes baile 19:30-22:00 (solo entrena 5:30-6:30am). SÁBADOS salida fija con la grupeta Vegabikes a ritmo muy fuerte (no se salta; es su desestrés). Domingo se adapta.

CARRERAS:
${racesTxt}

PROBLEMAS A CORREGIR: (1) zona gris — entrena demasiado en Z3-Z4, falta polarización real; (2) cadencia baja 69-76rpm, subir a 90-100; (3) gap FTP/VO2máx — más Z2 puro y umbral estructurado; (4) días duros seguidos sin recuperar.

NUTRICIÓN (sistema de intercambios de Más Que Calorías): 1 harina≈15g carbo, 1 fruta≈15g carbo, 1 lácteo≈12g carbo+8g prote, 1 proteína≈7g prote, 1 grasa≈5g. InBody ene 2026: peso ${NUTR.goal.pesoActual}kg, músculo ${NUTR.goal.mme}kg, grasa ${NUTR.goal.pgc}%, TMB ${NUTR.goal.tmb}. META: bajar a ${NUTR.goal.pesoIdeal}kg (${NUTR.goal.controlGrasa}kg de grasa) CONSERVANDO músculo. Por eso: proteína alta siempre, carbo periodizado según entreno. Hoy es día tipo "${nutritionToday()}": ${JSON.stringify(NUTR.dayTypes[nutritionToday()].ex)}. Cuando recomiendes comida, usá intercambios y productos de Costa Rica (yogurt griego Protein Power, avena, pechuga, tortilla de maíz, frijoles, banano, aguacate). En rides largos: 60-90g carbo/hora. Recuperación post: carbo + proteína en 45 min.

PRINCIPIOS: respetá su readiness/recovery. Si readiness<25 o recovery alto, mandá descanso aunque él quiera entrenar. Hacé los días fáciles DE VERDAD fáciles (Z2) para que el sábado duro sea sostenible. Periodizá hacia las carreras A (Cerro 25-26 jul, Caribe 17 oct). Sé honesto si algo es mala idea.`;
}

async function ensurePuter(){
  if(!window.puter){ return false; }
  try{
    if(!(await puter.auth.isSignedIn())){ await puter.auth.signIn(); }
    return await puter.auth.isSignedIn();
  }catch(e){ return false; }
}

function addMsg(role,text){
  const el=document.createElement("div"); el.className="msg "+role;
  if(role==="a"||role==="u") el.textContent=text; else el.innerHTML=text;
  document.getElementById("chat").appendChild(el);
  el.scrollIntoView({behavior:"smooth",block:"end"});
  return el;
}
function setCoachStatus(s){ document.getElementById("coachStatus").textContent=s; }

async function ask(text){
  text=(text||document.getElementById("chatInput").value).trim();
  if(!text) return;
  document.getElementById("chatInput").value="";
  addMsg("u",text);
  const ok=await ensurePuter();
  if(!ok){ addMsg("sys","Necesitás iniciar sesión en Puter para usar el coach. En la versión publicada aparece una ventana para conectar (es gratis, una sola vez)."); return; }
  setCoachStatus("Coach Claude · conectado");
  const typing=addMsg("a",""); typing.innerHTML='<span class="typing"><i></i><i></i><i></i></span>';
  chatHistory.push({role:"user",content:text});
  try{
    const messages=[{role:"system",content:coachSystemPrompt()}, ...chatHistory];
    const resp=await puter.ai.chat(messages,{model:"claude-sonnet-4-6"});
    const out=extractText(resp);
    typing.textContent=out;
    chatHistory.push({role:"assistant",content:out});
  }catch(e){
    typing.classList.remove("a"); typing.className="msg sys";
    typing.textContent="No pude conectar con el coach. Revisá tu sesión de Puter e intentá de nuevo.";
  }
}
function extractText(resp){
  try{
    if(typeof resp==="string") return resp;
    if(resp.message&&resp.message.content){
      const c=resp.message.content;
      if(typeof c==="string") return c;
      if(Array.isArray(c)) return c.map(b=>b.text||"").join("");
    }
    if(resp.text) return resp.text;
    if(resp.content) return Array.isArray(resp.content)?resp.content.map(b=>b.text||"").join(""):resp.content;
  }catch(e){}
  return "(respuesta vacía)";
}

// ===================== NAV ============================================
const TABS={ hoy:["Hoy",renderHoy], plan:["Plan",renderPlan], coach:["Coach",null], comida:["Comida",renderComida], carreras:["Carreras",renderCarreras] };
let CURRENT="hoy";
function go(tab){
  CURRENT=tab;
  for(const k in TABS){
    const sec=document.getElementById("tab-"+k);
    sec.classList.toggle("hidden", k!==tab);
    if(k===tab) sec.classList.add("fade");
  }
  document.querySelectorAll("nav button").forEach(b=>b.classList.toggle("active",b.dataset.tab===tab));
  document.getElementById("hdrTitle").textContent=TABS[tab][0];
  if(TABS[tab][1]) TABS[tab][1]();
}

// ===================== AJUSTES / REFRESCAR / PWA =====================
function toast(msg){
  const el=document.createElement("div"); el.textContent=msg;
  el.style.cssText="position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:#1F2421;color:#fff;padding:10px 16px;border-radius:9999px;font-size:13px;z-index:60;max-width:90%;text-align:center";
  document.body.appendChild(el); setTimeout(()=>el.remove(),2600);
}
function rerender(){ if(TABS[CURRENT] && TABS[CURRENT][1]) TABS[CURRENT][1](); }

async function doRefresh(){
  toast("Actualizando…");
  const r=await fetchLive();
  initHeader(); rerender();
  toast(r.ok ? "Datos actualizados" : (r.reason==="nopass" ? "Poné tu frase en Ajustes" : "Sin datos nuevos (usando demo)"));
}

function openSettings(){
  const pass=lsGet("coach_pass")||"";

    <label>Frase para descifrar tus datos</label>
    <input id="set-pass" type="password" value="${esc(pass)}" placeholder="la misma frase del robot (DATA_PASSPHRASE)">
    <div class="muted" style="font-size:12px;margin-top:6px">Es la misma que pusiste en GitHub. Se guarda solo en este teléfono y nunca viaja a ningún lado; sirve para descifrar tus datos localmente.</div>
    <div class="row" style="margin-top:16px;gap:10px">
      <button class="btn ghost" onclick="closeSet()">Cerrar</button>
      <button class="btn" onclick="saveSettings()">Guardar y actualizar</button>
    </div>
    <button class="btn ghost" style="margin-top:10px" onclick="addToHome()">Cómo agregar a inicio</button>
  </div>`;
  m.addEventListener("click",e=>{ if(e.target===m) closeSet(); });
  document.body.appendChild(m);
}
function closeSet(){ const m=document.getElementById("setModal"); if(m) m.remove(); }
async function saveSettings(){
  lsSet("coach_pass", document.getElementById("set-pass").value.trim());

}
function addToHome(){
  toast("iPhone: Compartir → Agregar a inicio. Android: menú ⋮ → Instalar app.");
}

function registerSW(){
  if("serviceWorker" in navigator){
    navigator.serviceWorker.register("sw.js").catch(()=>{});
  }
}

  document.getElementById("hdrDate").textContent=full+" "+d.getDate()+" "+MON[d.getMonth()]+" · "+DATA.athlete.city;
